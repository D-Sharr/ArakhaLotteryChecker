        @font-face {
            font-family: "MyanmarAngoun-UnknownAuthor";
            src: local('Myanmar Angoun'), url('https://cdn.jsdelivr.net/gh/saturngod/myanmar-unicode-fonts@master/docs/unknown/MyanmarAngoun.ttf') format('truetype');

        body {

        .header {
            background: #A01217;
            padding: 2.5rem 1rem;

            position: relative;

        .header-content {

            z-index: 1;

        .header .org {

            color: rgba(255,255,255,0.9);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 0.75rem;

        .header h1 {
            font-family: "MyanmarPhikselSmooth", 'Poppins', sans-serif;

        .draw-selector {

        }

            to { opacity: 1; transform: translateY(0); }

        .check-cta {

            left: 0;
            right: 0;

            z-index: 100;
            display: flex;
            justify-content: center;

        .check-cta-btn {

            gap: 0.6rem;
            padding: 0.9rem 2.5rem;

            color: #fff;
            border: none;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;

        .check-cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(160, 18, 23, 0.5);
        }

        .check-cta-btn:active {
            transform: translateY(0);
        }

        .check-cta-btn svg {
            width: 20px;
            height: 20px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 200;
            justify-content: center;
            align-items: flex-end;
            animation: fadeOverlay 0.3s ease;
        }

        .modal-overlay.show {
            display: flex;
        }

        @keyframes fadeOverlay {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: #FFFFFF;
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.5rem 1.5rem 2rem;
            animation: slideUp 0.35s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: #d1d5db;
            border-radius: 2px;
            margin: 0 auto 1.25rem;
        }

        .modal h2 {
            font-size: 1.3rem;
            text-align: center;
            margin-bottom: 0.25rem;
            color: var(--text);
        }

        .modal > p {

            color: var(--text-muted);
            text-align: center;

        }

        .input-wrapper {
            position: relative;
            max-width: 320px;
            margin: 0 auto;
        }

        .input-wrapper input {
            width: 100%;
            padding: 1rem 2.8rem 1rem 1.25rem;
            border: 2px solid #e5e0d8;
            border-radius: 14px;
            background: #F8F5F0;
            color: var(--text);
            font-family: 'Roboto Mono', monospace;

        .input-wrapper input:focus {

            border-color: #D8A32B;
            box-shadow: 0 0 0 4px rgba(216, 163, 43, 0.15);
            background: #fff;

        .input-wrapper input::placeholder {
            letter-spacing: 2px;
            font-weight: 400;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            color: #b0a89e;
        }

        .input-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: #e5e0d8;
            color: #6b7280;
            font-size: 0.85rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .input-clear.show {
            display: flex;
        }

        .input-clear:hover {
            background: #d1d5db;
        }

        .check-actions {
            display: flex;
            gap: 0.75rem;
            max-width: 320px;
            margin: 1rem auto 0;
        }

        .check-btn-primary {
            flex: 1;
            padding: 0.9rem;
            background: linear-gradient(135deg, #A01217, #D8A32B);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .check-btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(160, 18, 23, 0.4);
        }

        .check-btn-primary:active {
            transform: translateY(0);
        }

        .check-btn-secondary {
            padding: 0.9rem 1.25rem;
            background: #F8F5F0;
            border: 1px solid #e5e0d8;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: background 0.2s;
        }

        .check-btn-secondary:hover {
            background: #ede8e0;
        }

        .result-display {
            margin-top: 1.25rem;
            display: none;
        }

        .result-display.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        .result-card-win {
            background: linear-gradient(135deg, rgba(216, 163, 43, 0.08), rgba(160, 18, 23, 0.04));
            border: 2px solid #D8A32B;
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
        }

        .result-card-win .icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .result-card-win h3 {
            font-size: 1.25rem;
            color: #D8A32B;
            margin-bottom: 0.25rem;
        }

        .result-card-win .prize-name {
            font-size: 1.05rem;
            color: #8a6d1b;
            font-weight: 600;
        }

        .result-card-win .prize-value {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .result-card-lose {
            background: #F8F5F0;
            border: 2px solid #e5e0d8;
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
        }

        .result-card-lose .icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .result-card-lose h3 {
            font-size: 1.15rem;
            color: #A01217;
        }

        .result-card-lose p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        .modal-close {
            display: block;
            margin: 1.25rem auto 0;
            background: none;
            border: 1px solid #e5e0d8;
            border-radius: 8px;
            padding: 0.5rem 1.5rem;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: background 0.2s;
        }

        .modal-close:hover {
            background: #F8F5F0;
        }

        .prize-section {
            margin-bottom: 1.5rem;
        }

        .prize-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .prize-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        .prize-card-header {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .prize-card-header.first,
        .prize-card-header.second,
        .prize-card-header.third,
        .prize-card-header.fourth,
        .prize-card-header.fifth,
        .prize-card-header.sixth {
            background: #123A7A;
        }

        .prize-card-header h3 {
            font-family: "MyanmarAngoun-UnknownAuthor", 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        .prize-card-header .value {
            background: rgba(255,255,255,0.25);
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #fff;
        }

        .prize-card-body {
            padding: 1rem 1.5rem 1.25rem;
        }

        .numbers-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .number-tag {
            background: rgba(18, 58, 122, 0.08);
            border: 1px solid rgba(18, 58, 122, 0.15);
            padding: 0.4rem 0.9rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #000000;
            font-family: 'Roboto Mono', monospace;
            transition: background 0.2s;
        }

        .number-tag:hover {
            background: rgba(18, 58, 122, 0.14);
        }

        .number-tag.highlight {
            background: rgba(216, 163, 43, 0.25);
            border-color: #D8A32B;
            color: #000000;
            animation: glow 1.5s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(216, 163, 43, 0.2); }
            50% { box-shadow: 0 0 12px rgba(216, 163, 43, 0.35); }
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--card-border);
            border-top-color: #D8A32B;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
            filter: drop-shadow(0 0 6px rgba(216, 163, 43, 0.4));
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-msg {
            text-align: center;
            padding: 2rem;
            color: var(--danger);
        }

        @media (max-width: 600px) {
            .header {
                padding: 1.75rem 1rem;
            }

            .header .org {
                font-size: 0.7rem;
                letter-spacing: 1px;
                margin-bottom: 0.5rem;
            }

            .header h1 {
                font-size: 1.5rem;
                line-height: 1.2;
            }

            .header .draw-info {
                gap: 0.5rem;
                margin-top: 0.75rem;
            }

            .header .draw-info span {
                font-size: 0.75rem;
                padding: 0.3rem 0.8rem;
            }

            .draw-selector {
                margin-top: 0.75rem;
            }

            .draw-selector label {
                font-size: 0.75rem;
            }

            .draw-selector select {
                font-size: 0.8rem;
                padding: 0.4rem 2rem 0.4rem 0.9rem;
            }

            .container {
                padding: 1.25rem 0.75rem 6rem;
            }

            .prize-card-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.35rem;
                padding: 0.85rem 1rem;
            }

            .prize-card-header h3 {
                font-size: 0.95rem;
            }

            .prize-card-header .value {
                font-size: 0.75rem;
            }

            .prize-card-body {
                padding: 0.85rem 1rem 1rem;
            }

            .numbers-grid {
                gap: 0.4rem;
            }

            .number-tag {
                font-size: 0.85rem;
                padding: 0.35rem 0.7rem;
                letter-spacing: 1px;
                flex: 1 1 auto;
                text-align: center;
                min-width: 70px;
            }

            .check-cta {
                padding: 0.75rem;
            }

            .check-cta-btn {
                width: 100%;
                justify-content: center;
                padding: 0.85rem 1.5rem;
                font-size: 1rem;
            }

            .modal {
                padding: 1.25rem 1rem 1.5rem;
                max-height: 90vh;
            }

            .modal h2 {
                font-size: 1.15rem;
            }

            .modal-draw-selector select {
                font-size: 0.9rem;
                padding: 0.55rem 2rem 0.55rem 0.85rem;
            }

            .input-wrapper input {
                font-size: 1.25rem;
                letter-spacing: 4px;
                padding: 0.9rem 2.5rem 0.9rem 1rem;
            }

            .check-actions {
                flex-direction: column;
                gap: 0.5rem;
            }

        }

<body>

<header class="header">
    <div class="header-content">
        <div class="org" id="orgName">Loading...</div>
        <h1 id="lotteryName">Lottery Results</h1>
        <div class="draw-info">
            <span id="drawCount">-</span>
            <span id="drawDate">-</span>
        </div>
        <div class="draw-selector">
            <label for="drawSelect">အကြိမ်ရွေးချယ်ပါ</label>
            <select id="drawSelect" onchange="onDrawSelectChange(this)">
                <option value="" disabled selected>Loading...</option>
            </select>
        </div>
    </div>
</header>

<div class="container">
    <div id="resultsContainer">
        <div class="loading">
            <div class="spinner"></div>
            <p>Loading results...</p>
        </div>
    </div>
</div>

<div class="check-cta">
    <button class="check-cta-btn" onclick="openModal()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
        Check Your Tickets
    </button>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
    <div class="modal">
        <div class="modal-handle"></div>
        <h2>Check Your Ticket</h2>
        <p>Enter your 6-digit ticket number</p>
        <div class="modal-draw-selector">
            <label for="ticketDrawSelect">အကြိမ်ရွေးချယ်ပါ</label>
            <select id="ticketDrawSelect">
                <option value="" disabled>Loading...</option>
            </select>
        </div>
        <div class="input-wrapper">
            <input type="text" id="ticketInput" maxlength="6" placeholder="e.g. 323692"
                   oninput="onInputChange(this)"
                   onkeydown="if(event.key === 'Enter') checkTicket()">
            <button class="input-clear" id="inputClear" onclick="clearInput()">✕</button>
        </div>
        <div class="check-actions">
            <button class="check-btn-primary" onclick="checkTicket()">Check Result</button>
            <button class="check-btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
        <div class="result-display" id="resultDisplay"></div>
    </div>
</div>

<script>
    let lotteryData = null;
    let allDraws = [];

    const prizeConfig = {
        first_prize:  { label: 'First Prize',  css: 'first',  icon: '🥇' },
        second_prize: { label: 'Second Prize', css: 'second', icon: '🥈' },
        third_prize:  { label: 'Third Prize',  css: 'third',  icon: '🥉' },
        fourth_prize: { label: 'Fourth Prize', css: 'fourth', icon: '🏅' },
        fifth_prize:  { label: 'Fifth Prize',  css: 'fifth',  icon: '🎖️' },
        sixth_prize:  { label: 'Sixth Prize',  css: 'sixth',  icon: '🎗️' }
    };

    async function loadDrawsManifest() {
        try {
            const resp = await fetch('data/draws.json');
            if (!resp.ok) throw new Error('Failed to load draw manifest');
            const manifest = await resp.json();
            allDraws = (manifest.draws || []).sort((a, b) => b.draw_count - a.draw_count);
            populateDrawSelector();
            if (allDraws.length > 0) {
                await loadDraw(allDraws[0].file);
            } else {
                throw new Error('No draws available');
            }
        } catch (e) {
            document.getElementById('resultsContainer').innerHTML =
                '<div class="error-msg"><p>Failed to load draw list.</p></div>';
        }
    }

    function populateDrawSelector() {
        const select = document.getElementById('drawSelect');
        select.innerHTML = '';
        allDraws.forEach(draw => {
            const option = document.createElement('option');
            option.value = draw.file;
            option.textContent = draw.draw_count_name;
            select.appendChild(option);
        });
    }

    function populateTicketDrawSelector() {
        const select = document.getElementById('ticketDrawSelect');
        select.innerHTML = '';
        allDraws.forEach(draw => {
            const option = document.createElement('option');
            option.value = draw.file;
            option.textContent = draw.draw_count_name;
            select.appendChild(option);
        });
    }

    async function onDrawSelectChange(select) {
        const file = select.value;
        if (file) {
            document.getElementById('resultsContainer').innerHTML =
                '<div class="loading"><div class="spinner"></div><p>Loading results...</p></div>';
            await loadDraw(file);
        }
    }

    async function loadDraw(file) {
        try {
            const resp = await fetch(`data/${file}`);
            if (!resp.ok) throw new Error('Failed to load');
            lotteryData = await resp.json();
            lotteryData.file = file;
            document.getElementById('drawSelect').value = file;
            renderHeader();
            renderAllResults();
        } catch (e) {
            document.getElementById('resultsContainer').innerHTML =
                '<div class="error-msg"><p>Failed to load lottery results.</p></div>';
        }
    }

    function renderHeader() {
        document.getElementById('orgName').textContent = lotteryData.organization;
        document.getElementById('lotteryName').textContent = lotteryData.lottery_name;
        document.getElementById('drawCount').textContent = lotteryData.draw_count_name;
        document.getElementById('drawDate').textContent = new Date(lotteryData.date).toLocaleDateString('en-GB', {
            day: 'numeric', month: 'long', year: 'numeric'
        });
        updateSEO();
    }

    function updateSEO() {
        if (!lotteryData) return;

        const seo = lotteryData.seo || {};
        const title = seo.title || `${lotteryData.lottery_name} - ${lotteryData.draw_count_name}`;
        const description = seo.description || `${lotteryData.lottery_name} ${lotteryData.draw_count_name} ၏ ထီပေါက်စဉ်များကို စစ်ဆေးပါ။`;
        const keywords = seo.keywords || `အာရက္ခလောင်ပေါ်ပေါက်စဉ်, Arakkha Lottery, ${lotteryData.draw_count_name}, Myanmar Lottery, ထီပေါက်စဉ်`;

        document.getElementById('pageTitle').textContent = title;
        document.getElementById('metaDescription').setAttribute('content', description);
        document.getElementById('metaKeywords').setAttribute('content', keywords);
        document.getElementById('ogTitle').setAttribute('content', title);
        document.getElementById('ogDescription').setAttribute('content', description);
        document.getElementById('twitterTitle').setAttribute('content', title);
        document.getElementById('twitterDescription').setAttribute('content', description);
        document.getElementById('canonicalUrl').setAttribute('href', window.location.href);
        document.getElementById('ogUrl').setAttribute('content', window.location.href);

        const schema = {
            '@context': 'https://schema.org',
            '@type': 'WebPage',
            name: title,
            description: description,
            url: window.location.href,
            inLanguage: 'my',
            datePublished: lotteryData.date,
            publisher: {
                '@type': 'Organization',
                name: lotteryData.organization
            }
        };
        document.getElementById('jsonLdSchema').textContent = JSON.stringify(schema, null, 2);
    }

    function renderAllResults() {
        const container = document.getElementById('resultsContainer');
        let html = '';
        for (const [key, prize] of Object.entries(lotteryData.results)) {
            const cfg = prizeConfig[key] || { label: key, css: 'sixth', icon: '🎁' };
            html += `
                <div class="prize-section">
                    <div class="prize-card">
                        <div class="prize-card-header ${cfg.css}">
                            <h3>${cfg.icon} ${prize.prize_name_my}</h3>
                            <span class="value">${prize.prize_value}</span>
                        </div>
                        <div class="prize-card-body">
                            <div class="numbers-grid">
                                ${prize.winning_numbers.map(n => `<span class="number-tag">${n}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function onInputChange(el) {
        el.value = el.value.replace(/[^0-9]/g, '');
        document.getElementById('inputClear').classList.toggle('show', el.value.length > 0);
    }

    function clearInput() {
        const input = document.getElementById('ticketInput');
        input.value = '';
        input.focus();
        document.getElementById('inputClear').classList.remove('show');
        document.getElementById('resultDisplay').className = 'result-display';
    }

    function openModal() {
        populateTicketDrawSelector();
        const ticketSelect = document.getElementById('ticketDrawSelect');
        if (lotteryData && lotteryData.file) {
            ticketSelect.value = lotteryData.file;
        } else if (allDraws.length > 0) {
            ticketSelect.value = allDraws[0].file;
        }
        document.getElementById('modalOverlay').classList.add('show');
        document.getElementById('ticketInput').value = '';
        document.getElementById('inputClear').classList.remove('show');
        document.getElementById('resultDisplay').className = 'result-display';
        document.getElementById('resultDisplay').innerHTML = '';
        setTimeout(() => document.getElementById('ticketInput').focus(), 100);
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('show');
    }

    async function checkTicket() {
        const input = document.getElementById('ticketInput').value.trim();
        const display = document.getElementById('resultDisplay');

        if (!input || input.length !== 6 || !/^\d{6}$/.test(input)) {
            display.className = 'result-display show';
            display.innerHTML = `
                <div class="result-card-lose">
                    <div class="icon">⚠️</div>
                    <h3>Invalid Input</h3>
                    <p>Please enter a valid 6-digit ticket number.</p>
                </div>
            `;
            return;
        }

        const selectedFile = document.getElementById('ticketDrawSelect').value;
        if (!selectedFile) {
            display.className = 'result-display show';
            display.innerHTML = `
                <div class="result-card-lose">
                    <div class="icon">⚠️</div>
                    <h3>No Draw Selected</h3>
                    <p>Please select a draw count.</p>
                </div>
            `;
            return;
        }

        let checkData = lotteryData && lotteryData.file === selectedFile ? lotteryData : null;
        if (!checkData) {
            display.className = 'result-display show';
            display.innerHTML = `
                <div class="result-card-lose">
                    <div class="icon">⏳</div>
                    <h3>Loading...</h3>
                    <p>Please wait for results to load.</p>
                </div>
            `;
            try {
                const resp = await fetch(`data/${selectedFile}`);
                if (!resp.ok) throw new Error('Failed to load');
                checkData = await resp.json();
                checkData.file = selectedFile;
            } catch (e) {
                display.className = 'result-display show';
                display.innerHTML = `
                    <div class="result-card-lose">
                        <div class="icon">⚠️</div>
                        <h3>Load Failed</h3>
                        <p>Could not load the selected draw results.</p>
                    </div>
                `;
                return;
            }
        }

        let won = null;
        for (const [key, prize] of Object.entries(checkData.results)) {
            if (prize.winning_numbers.includes(input)) {
                won = { key, prize };
                break;
            }
        }

        if (won) {
            const cfg = prizeConfig[won.key] || { label: won.key };
            display.className = 'result-display show';
            display.innerHTML = `
                <div class="result-card-win">
                    <div class="icon">🎉</div>
                    <h3>Congratulations! You Won!</h3>
                    <div class="prize-name">${won.prize.prize_name_my}</div>
                    <div class="prize-value">${cfg.label} — ${won.prize.prize_value}</div>
                </div>
            `;
        } else {
            display.className = 'result-display show';
            display.innerHTML = `
                <div class="result-card-lose">
                    <div class="icon">😔</div>
                    <h3>Not a Winner</h3>
                    <p>Ticket <strong>${input}</strong> did not win a prize in ${checkData.draw_count_name}.</p>
                </div>
            `;
        }
    }

    loadDrawsManifest();
</script>

</body>
</html>
